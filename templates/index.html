<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zebronics ASP Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    overflow-x:hidden;
}

/* HEADER */

.header{
    padding:20px 15px 10px;
}

.header h1{
    font-size:28px;
    font-weight:bold;
}

.header p{
    margin-top:5px;
    color:#cbd5e1;
    font-size:13px;
}

/* TITLE */

.top-title{
    padding:10px 15px;
    font-size:20px;
    font-weight:bold;
}

/* ZONE CONTAINER */

.zone-container{
    display:flex;
    overflow-x:auto;
    gap:12px;
    padding:15px;
}

.zone-container::-webkit-scrollbar{
    display:none;
}

/* SMALL CARDS */

.zone-card{
    min-width:190px;
    max-width:190px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    border-radius:18px;
    padding:16px;
    position:relative;
    border:1px solid rgba(255,255,255,0.1);
    transition:0.3s;
    flex-shrink:0;
}

.zone-card:hover{
    transform:translateY(-4px);
}

/* RANK */

.rank{
    position:absolute;
    top:10px;
    right:10px;
    background:white;
    color:black;
    padding:5px 10px;
    border-radius:30px;
    font-size:11px;
    font-weight:bold;
}

/* ZONE */

.zone-name{
    font-size:24px;
    font-weight:bold;
    margin-top:10px;
}

/* PERCENT */

.percent{
    font-size:38px;
    font-weight:bold;
    margin-top:12px;
    color:#22c55e;
}

/* STATS */

.stats{
    margin-top:15px;
}

.stat-line{
    display:flex;
    justify-content:space-between;
    margin-top:10px;
    color:#e2e8f0;
    font-size:12px;
}

/* SUMMARY */

.summary{
    margin:15px;
    background:rgba(255,255,255,0.08);
    border-radius:20px;
    padding:18px;
    border:1px solid rgba(255,255,255,0.1);
}

.summary h2{
    margin-bottom:15px;
    font-size:20px;
}

.summary-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

.box{
    background:rgba(255,255,255,0.08);
    padding:15px;
    border-radius:15px;
}

.box-title{
    color:#cbd5e1;
    font-size:12px;
}

.box-value{
    margin-top:8px;
    font-size:24px;
    font-weight:bold;
}

/* MOBILE */

@media(max-width:600px){

    .zone-card{
        min-width:160px;
        max-width:160px;
    }

    .zone-name{
        font-size:20px;
    }

    .percent{
        font-size:30px;
    }

    .box-value{
        font-size:22px;
    }

}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

    <h1>ZEBRONICS ASP</h1>

    <p>
        Zone Performance Dashboard
    </p>

</div>

<!-- TITLE -->

<div class="top-title">

    Top Performing Zones

</div>

<!-- ZONES -->

<div class="zone-container" id="zoneContainer">

</div>

<!-- SUMMARY -->

<div class="summary">

    <h2>Overall Performance</h2>

    <div class="summary-grid">

        <div class="box">

            <div class="box-title">
                Total 0-3 Days
            </div>

            <div class="box-value" id="total03">
                0
            </div>

        </div>

        <div class="box">

            <div class="box-title">
                Total Outwards
            </div>

            <div class="box-value" id="totalOutwards">
                0
            </div>

        </div>

        <div class="box">

            <div class="box-title">
                Overall %
            </div>

            <div class="box-value" id="overallPercent">
                0%
            </div>

        </div>

        <div class="box">

            <div class="box-title">
                Active Zones
            </div>

            <div class="box-value">
                4
            </div>

        </div>

    </div>

</div>

<script>

fetch("{{ url_for('static', filename='json/top.json') }}")

.then(response => response.json())

.then(data => {

    const ranks = [

        "🥇 1st",
        "🥈 2nd",
        "🥉 3rd",
        "🏅 4th"

    ];

    const container =
    document.getElementById("zoneContainer");

    /* SORT */

    const zones = Object.entries(data)

    .filter(([key]) => key !== "Grand_Total")

    .sort((a,b)=>

        parseInt(b[1].Percentage)

        -

        parseInt(a[1].Percentage)

    );

    /* CARDS */

    zones.forEach((zone,index)=>{

        const name = zone[0];

        const details = zone[1];

        container.innerHTML += `

        <div class="zone-card">

            <div class="rank">
                ${ranks[index]}
            </div>

            <div class="zone-name">
                ${name}
            </div>

            <div class="percent">
                ${details.Percentage}
            </div>

            <div class="stats">

                <div class="stat-line">

                    <span>0-3 Days</span>

                    <b>
                    ${details.Sum_of_0_3.toLocaleString()}
                    </b>

                </div>

                <div class="stat-line">

                    <span>Outwards</span>

                    <b>
                    ${details.Sum_of_Total_Outwards.toLocaleString()}
                    </b>

                </div>

            </div>

        </div>

        `;

    });

    /* SUMMARY */

    document.getElementById("total03").innerText =

    data.Grand_Total.Sum_of_0_3.toLocaleString();

    document.getElementById("totalOutwards").innerText =

    data.Grand_Total.Sum_of_Total_Outwards.toLocaleString();

    document.getElementById("overallPercent").innerText =

    data.Grand_Total.Percentage;

});

</script>

</body>
</html>
