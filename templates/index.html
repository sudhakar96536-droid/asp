<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zebronics ASP Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    overflow-x:hidden;
}

/* HEADER */

.header{
    padding:15px 10px 5px;
}

.header h1{
    font-size:24px;
    font-weight:bold;
}

.header p{
    font-size:11px;
    color:#cbd5e1;
    margin-top:4px;
}

/* TITLE */

.top-title{
    padding:10px;
    font-size:18px;
    font-weight:bold;
}

/* ZONE GRID */

.zone-container{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
    padding:10px;
}

/* CARD */

.zone-card{
    background:rgba(255,255,255,0.08);
    border-radius:14px;
    padding:10px;
    position:relative;
    border:1px solid rgba(255,255,255,0.08);
}

/* RANK */

.rank{
    position:absolute;
    top:6px;
    right:6px;
    background:white;
    color:black;
    padding:3px 6px;
    border-radius:20px;
    font-size:8px;
    font-weight:bold;
}

/* ZONE */

.zone-name{
    font-size:16px;
    font-weight:bold;
    margin-top:12px;
}

/* PERCENT */

.percent{
    font-size:24px;
    font-weight:bold;
    margin-top:10px;
    color:#22c55e;
}

/* STATS */

.stats{
    margin-top:10px;
}

.stat-line{
    margin-top:8px;
    font-size:9px;
    color:#e2e8f0;
}

/* SUMMARY */

.summary{
    margin:10px;
    background:rgba(255,255,255,0.08);
    border-radius:16px;
    padding:15px;
}

.summary h2{
    font-size:18px;
    margin-bottom:15px;
}

.summary-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.box{
    background:rgba(255,255,255,0.08);
    padding:12px;
    border-radius:12px;
}

.box-title{
    font-size:10px;
    color:#cbd5e1;
}

.box-value{
    font-size:18px;
    font-weight:bold;
    margin-top:6px;
}

/* MOBILE */

@media(max-width:600px){

    .zone-name{
        font-size:13px;
    }

    .percent{
        font-size:18px;
    }

    .stat-line{
        font-size:8px;
    }

}

</style>

</head>

<body>

<div class="header">

    <h1>ZEBRONICS ASP</h1>

    <p>
        Zone Performance Dashboard
    </p>

</div>

<div class="top-title">

    Top Performing Zones

</div>

<div class="zone-container" id="zoneContainer">

</div>

<div class="summary">

    <h2>Overall Performance</h2>

    <div class="summary-grid">

        <div class="box">

            <div class="box-title">
                Total 0-3 Days
            </div>

            <div class="box-value" id="total03">
                0
            </div>

        </div>

        <div class="box">

            <div class="box-title">
                Total Outwards
            </div>

            <div class="box-value" id="totalOutwards">
                0
            </div>

        </div>

        <div class="box">

            <div class="box-title">
                Overall %
            </div>

            <div class="box-value" id="overallPercent">
                0%
            </div>

        </div>

        <div class="box">

            <div class="box-title">
                Active Zones
            </div>

            <div class="box-value">
                4
            </div>

        </div>

    </div>

</div>

<script>

fetch("{{ url_for('static', filename='json/top.json') }}")

.then(response => response.json())

.then(data => {

    const ranks = [

        "🥇1",
        "🥈2",
        "🥉3",
        "🏅4"

    ];

    const container =
    document.getElementById("zoneContainer");

    const zones = Object.entries(data)

    .filter(([key]) => key !== "Grand_Total")

    .sort((a,b)=>

        parseInt(b[1].Percentage)

        -

        parseInt(a[1].Percentage)

    );

    zones.forEach((zone,index)=>{

        const name = zone[0];

        const details = zone[1];

        container.innerHTML += `

        <div class="zone-card">

            <div class="rank">
                ${ranks[index]}
            </div>

            <div class="zone-name">
                ${name}
            </div>

            <div class="percent">
                ${details.Percentage}
            </div>

            <div class="stats">

                <div class="stat-line">

                    0-3 :
                    <b>
                    ${details.Sum_of_0_3.toLocaleString()}
                    </b>

                </div>

                <div class="stat-line">

                    OUT :
                    <b>
                    ${details.Sum_of_Total_Outwards.toLocaleString()}
                    </b>

                </div>

            </div>

        </div>

        `;

    });

    document.getElementById("total03").innerText =

    data.Grand_Total.Sum_of_0_3.toLocaleString();

    document.getElementById("totalOutwards").innerText =

    data.Grand_Total.Sum_of_Total_Outwards.toLocaleString();

    document.getElementById("overallPercent").innerText =

    data.Grand_Total.Percentage;

});

</script>

</body>
</html>
