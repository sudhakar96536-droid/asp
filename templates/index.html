<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zebronics ASP Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{

    background:
    repeating-linear-gradient(
        135deg,
        #000 0px,
        #000 18px,
        #111 18px,
        #111 36px
    );

    color:white;
    overflow-x:hidden;
}

/* HEADER */

.header{
    padding:15px 10px 5px;
}

.header-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header h1{
    font-size:24px;
    font-weight:bold;
    letter-spacing:1px;
}

.header p{
    font-size:11px;
    color:#d1d5db;
    margin-top:4px;
}

.current-date{
    font-size:14px;
    font-weight:bold;
    color:white;
}

/* TITLE */

.top-title{
    padding:10px;
    font-size:18px;
    font-weight:bold;
}

/* ZONE GRID */

.zone-container{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
    padding:10px;
}

/* ZONE CARD */

.zone-card{

    background:rgba(255,255,255,0.06);

    border:1px solid rgba(255,255,255,0.15);

    border-radius:14px;

    padding:10px;

    position:relative;

    backdrop-filter:blur(5px);

    box-shadow:
    0 0 10px rgba(255,255,255,0.05);

    cursor:pointer;

    transition:0.3s;

}

.zone-card:hover{
    transform:translateY(-3px);
    border-color:white;
}

.rank{
    position:absolute;
    top:6px;
    right:6px;
    background:white;
    color:black;
    padding:3px 6px;
    border-radius:20px;
    font-size:8px;
    font-weight:bold;
}

.zone-name{
    font-size:16px;
    font-weight:bold;
    margin-top:12px;
}

.percent{
    font-size:24px;
    font-weight:bold;
    margin-top:10px;
}

.stats{
    margin-top:10px;
}

.stat-line{
    margin-top:8px;
    font-size:9px;
    color:#e5e7eb;
}

/* OVERALL SUMMARY */

.summary{

    margin:10px;

    background:rgba(255,255,255,0.06);

    border:1px solid rgba(255,255,255,0.15);

    border-radius:16px;

    padding:15px;

}

.summary h2{
    font-size:18px;
    margin-bottom:15px;
}

.summary-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.box{
    background:rgba(255,255,255,0.06);
    padding:12px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.08);
}

.box-title{
    font-size:10px;
    color:#d1d5db;
}

.box-value{
    font-size:18px;
    font-weight:bold;
    margin-top:6px;
}

/* STATE SECTION */

.state-section{
    margin:10px;
    padding:15px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:16px;
}

.state-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.state-title{
    font-size:18px;
    font-weight:bold;
}

.overall-btn{
    background:white;
    color:black;
    border:none;
    padding:6px 12px;
    border-radius:20px;
    font-size:11px;
    font-weight:bold;
    cursor:pointer;
}

/* STATUS SUMMARY */

.status-summary{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:10px;
    margin-bottom:15px;
}

.status-box{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:12px;
    padding:10px;
    text-align:center;
}

.status-label{
    font-size:10px;
    color:#9ca3af;
}

.status-value{
    font-size:20px;
    font-weight:bold;
    margin-top:5px;
}

/* STATE LIST */

.state-list{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.state-card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:12px;
    padding:10px;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

.state-left{
    width:60%;
}

.state-rank{
    font-size:10px;
    color:#9ca3af;
}

.state-name{
    font-size:13px;
    font-weight:bold;
    margin-top:3px;
}

.state-zone{
    font-size:9px;
    color:#9ca3af;
    margin-top:3px;
}

.state-right{
    text-align:right;
}

.state-percent{
    font-size:18px;
    font-weight:bold;
}

.state-data{
    font-size:9px;
    color:#d1d5db;
    margin-top:4px;
    line-height:15px;
}

/* MOBILE */

@media(max-width:600px){

    .zone-name{
        font-size:13px;
    }

    .percent{
        font-size:18px;
    }

    .stat-line{
        font-size:8px;
    }

    .current-date{
        font-size:11px;
    }

    .state-name{
        font-size:11px;
    }

    .state-percent{
        font-size:15px;
    }

    .status-value{
        font-size:16px;
    }

}

</style>

</head>

<body>

<div class="header">

    <div class="header-top">

        <div>

            <h1>ZEBRONICS ASP</h1>

            <p>
                Zone Performance Dashboard
            </p>

        </div>

        <div class="current-date" id="currentDate">

        </div>

    </div>

</div>

<div class="top-title">
    Top Performing Zones
</div>

<div class="zone-container" id="zoneContainer">
</div>

<div class="summary">

    <h2>Overall Performance</h2>

    <div class="summary-grid">

        <div class="box">

            <div class="box-title">
                Total 0-3 Days
            </div>

            <div class="box-value" id="total03">
                0
            </div>

        </div>

        <div class="box">

            <div class="box-title">
                Total Outwards
            </div>

            <div class="box-value" id="totalOutwards">
                0
            </div>

        </div>

        <div class="box">

            <div class="box-title">
                Overall %
            </div>

            <div class="box-value" id="overallPercent">
                0%
            </div>

        </div>

        <div class="box">

            <div class="box-title">
                Active Zones
            </div>

            <div class="box-value">
                4
            </div>

        </div>

    </div>

</div>

<div class="state-section">

    <div class="state-header">

        <div class="state-title" id="stateTitle">
            Overall State Rankings
        </div>

        <button class="overall-btn"
        onclick="showStates('ALL')">
            OVERALL
        </button>

    </div>

    <div class="status-summary">

        <div class="status-box">

            <div class="status-label">
                TOTAL STATES
            </div>

            <div class="status-value"
            id="totalStates">
                0
            </div>

        </div>

        <div class="status-box">

            <div class="status-label">
                GOOD STATES
            </div>

            <div class="status-value"
            id="goodStates"
            style="color:#22c55e;">
                0
            </div>

        </div>

        <div class="status-box">

            <div class="status-label">
                BAD STATES
            </div>

            <div class="status-value"
            id="badStates"
            style="color:#ff4d4d;">
                0
            </div>

        </div>

    </div>

    <div class="state-list" id="stateList">

    </div>

</div>

<script>

/* DATE */

const today = new Date();

const day = today.getDate();

const monthNames = [
    "January","February","March","April",
    "May","June","July","August",
    "September","October","November","December"
];

const month = monthNames[today.getMonth()];

function getOrdinal(n){

    if(n > 3 && n < 21) return "th";

    switch(n % 10){

        case 1: return "st";
        case 2: return "nd";
        case 3: return "rd";
        default: return "th";

    }

}

document.getElementById("currentDate").innerText =
`${day}${getOrdinal(day)} ${month}`;

let allStates = [];

/* TOP ZONES */

fetch("{{ url_for('static', filename='json/top.json') }}")

.then(response => response.json())

.then(data => {

    const ranks = [
        "🥇1",
        "🥈2",
        "🥉3",
        "🏅4"
    ];

    const container =
    document.getElementById("zoneContainer");

    const zones = Object.entries(data)

    .filter(([key]) => key !== "Grand_Total")

    .sort((a,b)=>
        parseInt(b[1].Percentage)
        -
        parseInt(a[1].Percentage)
    );

    zones.forEach((zone,index)=>{

        const name = zone[0];

        const details = zone[1];

        const percentColor =
        parseInt(details.Percentage) < 70
        ? "#ff4d4d"
        : "#22c55e";

        container.innerHTML += `

        <div class="zone-card"
        onclick="showStates('${name}')">

            <div class="rank">
                ${ranks[index]}
            </div>

            <div class="zone-name">
                ${name}
            </div>

            <div class="percent"
            style="color:${percentColor};">

                ${details.Percentage}

            </div>

            <div class="stats">

                <div class="stat-line">

                    0-3 :
                    <b>
                    ${details.Sum_of_0_3.toLocaleString()}
                    </b>

                </div>

                <div class="stat-line">

                    OUT :
                    <b>
                    ${details.Sum_of_Total_Outwards.toLocaleString()}
                    </b>

                </div>

            </div>

        </div>

        `;

    });

    document.getElementById("total03").innerText =
    data.Grand_Total.Sum_of_0_3.toLocaleString();

    document.getElementById("totalOutwards").innerText =
    data.Grand_Total.Sum_of_Total_Outwards.toLocaleString();

    const overall =
    document.getElementById("overallPercent");

    overall.innerText =
    data.Grand_Total.Percentage;

    if(parseInt(data.Grand_Total.Percentage) < 70){

        overall.style.color = "#ff4d4d";

    }
    else{

        overall.style.color = "#22c55e";

    }

});

/* STATES */

fetch("{{ url_for('static', filename='json/top1.json') }}")

.then(response => response.json())

.then(data => {

    allStates = data;

    showStates('ALL');

});

function showStates(zone){

    const list =
    document.getElementById("stateList");

    const title =
    document.getElementById("stateTitle");

    list.innerHTML = "";

    let filtered = [];

    if(zone === 'ALL'){

        title.innerText =
        'Overall State Rankings';

        filtered = [...allStates];

    }
    else{

        title.innerText =
        zone + ' Zone State Rankings';

        filtered = allStates.filter(item =>
            item.Zone === zone
        );

    }

    filtered.sort((a,b)=>
        parseInt(b.Percentage)
        -
        parseInt(a.Percentage)
    );

    const totalStates = filtered.length;

    const goodStates =
    filtered.filter(item =>
        parseInt(item.Percentage) >= 70
    ).length;

    const badStates =
    filtered.filter(item =>
        parseInt(item.Percentage) < 70
    ).length;

    document.getElementById("totalStates").innerText =
    totalStates;

    document.getElementById("goodStates").innerText =
    goodStates;

    document.getElementById("badStates").innerText =
    badStates;

    filtered.forEach((item,index)=>{

        const color =
        parseInt(item.Percentage) < 70
        ? '#ff4d4d'
        : '#22c55e';

        list.innerHTML += `

        <div class="state-card">

            <div class="state-left">

                <div class="state-rank">
                    #${index + 1}
                </div>

                <div class="state-name">
                    ${item.Row_Labels}
                </div>

                <div class="state-zone">
                    ${item.Zone}
                </div>

            </div>

            <div class="state-right">

                <div class="state-percent"
                style="color:${color}">
                    ${item.Percentage}
                </div>

                <div class="state-data">

                    0-3 :
                    ${item.Sum_of_0_3.toLocaleString()}

                    <br>

                    OUT :
                    ${item.Sum_of_Total_Outwards.toLocaleString()}

                </div>

            </div>

        </div>

        `;

    });

}

</script>

</body>
</html>
