<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zebronics ASP Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:
    repeating-linear-gradient(
        135deg,
        #000 0px,
        #000 18px,
        #111 18px,
        #111 36px
    );

    color:white;
    overflow-x:hidden;
}

/* HEADER */

.header{
    padding:15px 10px 5px;
}

.header-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header h1{
    font-size:24px;
    font-weight:bold;
}

.header p{
    font-size:11px;
    color:#ccc;
}

.current-date{
    font-size:13px;
    font-weight:bold;
}

/* TITLE */

.top-title{
    padding:10px;
    font-size:18px;
    font-weight:bold;
}

/* ZONES */

.zone-container{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
    padding:10px;
}

.zone-card{

    background:rgba(255,255,255,0.06);

    border:1px solid rgba(255,255,255,0.15);

    border-radius:14px;

    padding:10px;

    cursor:pointer;

    position:relative;

}

.rank{
    position:absolute;
    top:6px;
    right:6px;
    background:white;
    color:black;
    padding:3px 6px;
    border-radius:20px;
    font-size:8px;
    font-weight:bold;
}

.zone-name{
    font-size:14px;
    font-weight:bold;
    margin-top:10px;
}

.percent{
    font-size:22px;
    font-weight:bold;
    margin-top:10px;
}

.stat-line{
    font-size:9px;
    margin-top:6px;
    color:#ddd;
}

/* SUMMARY */

.summary{
    margin:10px;
    background:rgba(255,255,255,0.05);
    border-radius:14px;
    padding:15px;
}

.summary-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.box{
    background:rgba(255,255,255,0.05);
    padding:10px;
    border-radius:12px;
}

.box-title{
    font-size:10px;
    color:#bbb;
}

.box-value{
    font-size:18px;
    font-weight:bold;
    margin-top:6px;
}

/* STATES */

.state-section{
    margin:10px;
    background:rgba(255,255,255,0.05);
    border-radius:14px;
    padding:15px;
}

.state-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.state-title{
    font-size:18px;
    font-weight:bold;
}

.overall-btn{
    border:none;
    background:white;
    color:black;
    padding:6px 12px;
    border-radius:20px;
    font-size:11px;
    font-weight:bold;
    cursor:pointer;
}

/* STATUS */

.status-summary{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:10px;
    margin-top:15px;
}

.status-box{
    background:rgba(255,255,255,0.05);
    border-radius:12px;
    padding:10px;
    text-align:center;
}

.status-label{
    font-size:10px;
    color:#aaa;
}

.status-value{
    font-size:18px;
    font-weight:bold;
    margin-top:5px;
}

/* STATE LIST */

.state-list{
    display:flex;
    flex-direction:column;
    gap:8px;
    margin-top:15px;
}

.state-card{
    background:rgba(255,255,255,0.05);
    border-radius:12px;
    padding:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    cursor:pointer;
}

.state-left{
    width:60%;
}

.state-rank{
    font-size:10px;
    color:#999;
}

.state-name{
    font-size:13px;
    font-weight:bold;
    margin-top:4px;
}

.state-zone{
    font-size:9px;
    color:#aaa;
    margin-top:3px;
}

.state-right{
    text-align:right;
}

.state-percent{
    font-size:18px;
    font-weight:bold;
}

.state-data{
    font-size:9px;
    color:#ddd;
    margin-top:4px;
    line-height:15px;
}

/* BRANCH SECTION */

.branch-section{
    margin:10px;
    background:rgba(255,255,255,0.05);
    border-radius:14px;
    padding:15px;
}

.branch-title{
    font-size:18px;
    font-weight:bold;
    margin-bottom:15px;
}

.branch-list{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.branch-card{
    background:rgba(255,255,255,0.05);
    border-radius:12px;
    padding:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.branch-left{
    width:65%;
}

.branch-name{
    font-size:12px;
    font-weight:bold;
}

.branch-zone{
    font-size:9px;
    color:#aaa;
    margin-top:4px;
}

.branch-right{
    text-align:right;
}

.branch-percent{
    font-size:17px;
    font-weight:bold;
}

.branch-data{
    font-size:9px;
    color:#ddd;
    margin-top:4px;
    line-height:15px;
}

/* MOBILE */

@media(max-width:600px){

    .zone-name{
        font-size:11px;
    }

    .percent{
        font-size:18px;
    }

    .state-name{
        font-size:11px;
    }

    .branch-name{
        font-size:11px;
    }
    .zone-card.active{
    border:2px solid #22c55e;
    box-shadow:0 0 15px rgba(34,197,94,0.4);
    transform:scale(1.02);
    }

}

</style>

</head>

<body>

<div class="header">

    <div class="header-top">

        <div>

            <h1>ZEBRONICS ASP</h1>

            <p>Zone Performance Dashboard</p>

        </div>

        <div class="current-date" id="currentDate"></div>

    </div>

</div>

<div class="top-title">
    Top Performing Zones
</div>

<div class="zone-container" id="zoneContainer"></div>

<div class="summary">

    <div class="summary-grid">

        <div class="box">

            <div class="box-title">
                Total 0-3 Days
            </div>

            <div class="box-value" id="total03">
                0
            </div>

        </div>

        <div class="box">

            <div class="box-title">
                Total Outwards
            </div>

            <div class="box-value" id="totalOutwards">
                0
            </div>

        </div>

        <div class="box">

            <div class="box-title">
                Overall %
            </div>

            <div class="box-value" id="overallPercent">
                0%
            </div>

        </div>

        <div class="box">

            <div class="box-title">
                Active Zones
            </div>

            <div class="box-value">
                4
            </div>

        </div>

    </div>

</div>

<!-- STATES -->

<div class="state-section">

    <div class="state-header">

        <div class="state-title" id="stateTitle">
            Overall State Rankings
        </div>

        <button class="overall-btn"
        onclick="showStates('ALL')">
            OVERALL
        </button>

    </div>

    <div class="status-summary">

        <div class="status-box">

            <div class="status-label">
                TOTAL STATES
            </div>

            <div class="status-value" id="totalStates">
                0
            </div>

        </div>

        <div class="status-box">

            <div class="status-label">
                GREEN STATES
            </div>

            <div class="status-value"
            style="color:#22c55e;"
            id="goodStates">
                0
            </div>

        </div>

        <div class="status-box">

            <div class="status-label">
                RED STATES
            </div>

            <div class="status-value"
            style="color:#ff4d4d;"
            id="badStates">
                0
            </div>

        </div>

    </div>

    <div class="state-list" id="stateList"></div>

</div>

<!-- BRANCHES -->

<div class="branch-section">

    <div class="branch-title" id="branchTitle">
        Branch Details
    </div>

    <div class="branch-list" id="branchList">

    </div>

</div>

<script>

/* DATE */

const today = new Date();

const day = today.getDate();

const monthNames = [
"January","February","March","April",
"May","June","July","August",
"September","October","November","December"
];

function getOrdinal(n){

    if(n > 3 && n < 21) return "th";

    switch(n % 10){

        case 1:return "st";
        case 2:return "nd";
        case 3:return "rd";
        default:return "th";

    }

}

document.getElementById("currentDate").innerText =
`${day}${getOrdinal(day)} ${monthNames[today.getMonth()]}`;

let allStates = [];
let allBranches = [];

/* ZONES */

fetch("{{ url_for('static', filename='json/top.json') }}")

.then(res=>res.json())

.then(data=>{

    const ranks = ["🥇1","🥈2","🥉3","🏅4"];

    const container =
    document.getElementById("zoneContainer");

    const zones = Object.entries(data)

    .filter(([key]) => key !== "Grand_Total")

    .sort((a,b)=>
        parseInt(b[1].Percentage)
        -
        parseInt(a[1].Percentage)
    );

    zones.forEach((zone,index)=>{

        const name = zone[0];

        const details = zone[1];

        const color =
        parseInt(details.Percentage) < 70
        ? "#ff4d4d"
        : "#22c55e";

        container.innerHTML += `

        <div class="zone-card"
        onclick="showStates('${name}')">

            <div class="rank">
                ${ranks[index]}
            </div>

            <div class="zone-name">
                ${name}
            </div>

            <div class="percent"
            style="color:${color};">
                ${details.Percentage}
            </div>

            <div class="stat-line">
                0-3 : ${details.Sum_of_0_3.toLocaleString()}
            </div>

            <div class="stat-line">
                OUT : ${details.Sum_of_Total_Outwards.toLocaleString()}
            </div>

        </div>

        `;

    });

    document.getElementById("total03").innerText =
    data.Grand_Total.Sum_of_0_3.toLocaleString();

    document.getElementById("totalOutwards").innerText =
    data.Grand_Total.Sum_of_Total_Outwards.toLocaleString();

    const overall =
    document.getElementById("overallPercent");

    overall.innerText =
    data.Grand_Total.Percentage;

    overall.style.color =
    parseInt(data.Grand_Total.Percentage) < 70
    ? "#ff4d4d"
    : "#22c55e";

});

/* STATES */

fetch("{{ url_for('static', filename='json/top1.json') }}")

.then(res=>res.json())

.then(data=>{

    allStates = data;

    showStates("ALL");

});

/* BRANCHES */

fetch("{{ url_for('static', filename='json/top2.json') }}")

.then(res=>res.json())

.then(data=>{

    allBranches = data;

});

/* SHOW STATES */

function showStates(zone){

    document.querySelectorAll(".zone-card")
    .forEach(e => e.classList.remove("active"));

    if(el){
        el.classList.add("active");
    }

    // rest of your code remains same...

    const list =
    document.getElementById("stateList");

    const title =
    document.getElementById("stateTitle");

    list.innerHTML = "";

    let filtered = [];

    if(zone === "ALL"){

        title.innerText =
        "Overall State Rankings";

        filtered = [...allStates];

    }
    else{

        title.innerText =
        zone + " Zone Rankings";

        filtered =
        allStates.filter(x =>
            x.Zone === zone
        );

    }

    filtered.sort((a,b)=>
        parseInt(b.Percentage)
        -
        parseInt(a.Percentage)
    );

    document.getElementById("totalStates").innerText =
    filtered.length;

    document.getElementById("goodStates").innerText =
    filtered.filter(x =>
        parseInt(x.Percentage) >= 70
    ).length;

    document.getElementById("badStates").innerText =
    filtered.filter(x =>
        parseInt(x.Percentage) < 70
    ).length;

    filtered.forEach((item,index)=>{

        const color =
        parseInt(item.Percentage) < 70
        ? "#ff4d4d"
        : "#22c55e";

        list.innerHTML += `

        <div class="state-card"
        onclick="showBranches('${item.Row_Labels}')">

            <div class="state-left">

                <div class="state-rank">
                    #${index + 1}
                </div>

                <div class="state-name">
                    ${item.Row_Labels}
                </div>

                <div class="state-zone">
                    ${item.Zone}
                </div>

            </div>

            <div class="state-right">

                <div class="state-percent"
                style="color:${color};">

                    ${item.Percentage}

                </div>

                <div class="state-data">

                    0-3 :
                    ${item.Sum_of_0_3.toLocaleString()}

                    <br>

                    OUT :
                    ${item.Sum_of_Total_Outwards.toLocaleString()}

                </div>

            </div>

        </div>

        `;

    });

    setTimeout(() => {

        document.querySelector(".state-section")
        .scrollIntoView({
            behavior: "smooth"
        });

    }, 100);

}

/* SHOW BRANCHES */

function showBranches(stateName){

    const branchTitle =
    document.getElementById("branchTitle");

    const branchList =
    document.getElementById("branchList");

    branchTitle.innerText =
    stateName + " Branch Details";

    branchList.innerHTML = "";

    const filtered =
    allBranches.filter(x =>
        x.State === stateName
    );

    filtered.forEach((item)=>{

        const percent =
        Math.round(
            (item["0_3"] / item.Total_Outwards) * 100
        );

        const color =
        percent < 70
        ? "#ff4d4d"
        : "#22c55e";

        branchList.innerHTML += `

        <div class="branch-card">

            <div class="branch-left">

                <div class="branch-name">
                    ${item.Location}
                </div>

                <div class="branch-zone">
                    ${item.Zone}
                </div>

            </div>

            <div class="branch-right">

                <div class="branch-percent"
                style="color:${color};">

                    ${percent}%

                </div>

                <div class="branch-data">

                    0-3 :
                    ${item["0_3"].toLocaleString()}

                    <br>

                    OUT :
                    ${item.Total_Outwards.toLocaleString()}

                </div>

            </div>

        </div>

        `;

    });


    /* AUTO SCROLL TO BRANCH SECTION */

    document.querySelector(".branch-section")

    .scrollIntoView({

        behavior: "smooth"

    });



}

</script>

</body>
</html>
